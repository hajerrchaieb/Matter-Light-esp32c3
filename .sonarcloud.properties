# .sonarcloud.properties — place à la RACINE du repo (pas sonar-project.properties)
# SonarCloud Cloud (GitHub App) lit CE fichier spécifiquement.

# Analyser seulement le code applicatif — pas les rapports ni les patches
sonar.sources=agents,supervisor,demo
sonar.exclusions=\
  reports/**,\
  esp-matter/**,\
  tools/**,\
  fuzz/**,\
  firmware/**,\
  .autofix-reports/**,\
  **/*.patch,\
  **/APPLY_ALL.sh

# Exclure les fichiers auto-générés du calcul de duplication
sonar.cpd.exclusions=\
  reports/**,\
  esp-matter/**,\
  tools/**,\
  fuzz/**,\
  **/*.patch,\
  **/generated_tests_*.cpp,\
  **/test_light_app_*.cpp

# Ignorer toutes les règles sur les dossiers auto-générés
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=reports/**
sonar.issue.ignore.multicriteria.e2.ruleKey=*
sonar.issue.ignore.multicriteria.e2.resourceKey=esp-matter/**
sonar.issue.ignore.multicriteria.e3.ruleKey=*
sonar.issue.ignore.multicriteria.e3.resourceKey=fuzz/**
sonar.issue.ignore.multicriteria.e4.ruleKey=*
sonar.issue.ignore.multicriteria.e4.resourceKey=tools/**
sonar.issue.ignore.multicriteria.e5.ruleKey=*
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.patch
